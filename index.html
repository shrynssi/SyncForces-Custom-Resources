<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncForces - Select Your Industry</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--bg-body); color: var(--text-main); font-family: var(--font-sans); }
    .hp-container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; text-align: center; }
    .hp-logo { max-width: 200px; margin-bottom: 20px; }
    .hp-title { font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 40px; color: var(--text-main); }
    .niche-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .niche-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 30px;
      text-decoration: none;
      color: var(--text-main);
      font-weight: 600;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      box-shadow: var(--shadow-sm);
    }
    .niche-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="hp-container">
    <img src="img/logo.png" alt="SyncForces" class="hp-logo">
    <h1 class="hp-title">Select your industry</h1>
    <div class="niche-grid">
      <a href="/remodeling" class="niche-card">Bathroom & Kitchen Remodeling</a><a href="/water-fire-restoration" class="niche-card">Water & Fire Restoration</a><a href="/landscaping" class="niche-card">Landscaping</a><a href="/fencing" class="niche-card">Fencing</a><a href="/masonry" class="niche-card">Masonry</a><a href="/concrete" class="niche-card">Concrete</a>
    </div>
  </div>
</body>
</html>
